<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تماس با ما | آکادمی دیجیتال</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><span class="brand-dot"></span> آکادمی دیجیتال</a>
    </div>
  </nav>

  <section class="page-hero">
    <div class="container">
      <h1>ارتباط با ما</h1>
      <p>اگر پیشنهاد، همکاری یا سوالی داری، از طریق فرم زیر پیام بده.</p>
    </div>
  </section>

  <section class="section-pad pt-0">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="content-box">
            <h3>فرم تماس</h3>
            <form>
              <div class="mb-3">
                <label class="form-label">نام</label>
                <input type="text" class="form-control form-dark" placeholder="نام شما">
              </div>
              <div class="mb-3">
                <label class="form-label">ایمیل</label>
                <input type="email" class="form-control form-dark" placeholder="example@email.com">
              </div>
              <div class="mb-3">
                <label class="form-label">پیام</label>
                <textarea class="form-control form-dark" rows="5" placeholder="پیام شما..."></textarea>
              </div>
              <button type="submit" class="btn btn-accent">ارسال پیام</button>
            </form>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="content-box">
            <h3>اطلاعات تماس</h3>
            <p><strong>ایمیل:</strong> info@academy.com</p>
            <p><strong>تلگرام:</strong> @academy</p>
            <p><strong>اینستاگرام:</strong> @academy</p>
            <p><strong>لینکدین:</strong> /company/academy</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
